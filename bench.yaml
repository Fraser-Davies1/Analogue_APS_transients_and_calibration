bench_name: "Active Pixel PD Derivation Bench"

experiment:
  title: "Photodiode Current Derivation"
  description: "Mapping I_LED to I_PD using 11pF integration capacitance"

instruments:
  psu:
    profile: "keysight/EDU36311A"
    safety_limits:
      channels:
        1: {voltage: {"max": 5.5}, current: {"max": 0.1}} # VDD
        2: {voltage: {"max": 5.5}, current: {"max": 0.1}} # LED
  
  osc:
    profile: "keysight/DSOX1204G"
  
  siggen:
    profile: "keysight/EDU33212A"

backend_defaults:
  type: "lamb"
  url: "http://lamb-server:8000"
  timeout_ms: 30000

simulate: false
